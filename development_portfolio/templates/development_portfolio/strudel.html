{% extends 'base.html' %}
{% load static %}
{% block title %}
<title>Strudel Development Console</title>
{% endblock %}
{% block extra_head %}
<link rel="stylesheet" href="{% static 'strudel.css' %}">
<script src="https://unpkg.com/@strudel/repl@latest"></script>
<script src="{% static 'strudel.js' %}" defer></script>
{% endblock %}

{% block content %}
<section class="p-6">
        <div class="mb-4 flex items-center justify-between">
            <a href="{% url 'dev-home' %}" class="btn btn-ghost btn-sm">← Back</a>
        </div>
        <h2 class="text-xl font-semibold mb-3">Strudel Editor</h2>
        <div class="strudel-toolbar">
            <div class="strudel-field">
                <label for="strudel-project-select">Project</label>
                <select id="strudel-project-select" class="strudel-select">
                    <option value="" selected>New project</option>
                    {% for project in strudel_projects %}
                        <option value="{{ project.id }}" data-user-id="{{ project.user_id }}">{{ project.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="strudel-field strudel-field-grow">
                <label for="strudel-project-title">Title</label>
                <input id="strudel-project-title" class="strudel-input" type="text" placeholder="Untitled Strudel project">
            </div>
            <div class="strudel-actions">
                <button id="strudel-save" class="btn btn-primary">Save</button>
                <div id="strudel-status" class="strudel-status" aria-live="polite"></div>
            </div>
        </div>
        <div class="flex flex-wrap gap-3 mb-3">
            <button id="strudel-play" class="btn btn-success">Play</button>
            <button id="strudel-stop" class="btn btn-outline btn-error">Stop</button>
        </div>
        <div class="strudel-wrap">
            <strudel-editor id="strudel-repl">
                <!--
setcps(1)
sound("bd hh sd hh").note("c3 e3 g3 b3").gain(0.8)
                -->
            </strudel-editor>
        </div>
        <input type="hidden" id="strudel-csrf" value="{{ csrf_token }}">
        <div
            id="strudel-endpoints"
            data-detail-url="{% url 'strudel-project-detail' project_id=0 %}"
            data-save-url="{% url 'strudel-project-save' %}"
            data-auth="{{ request.user.is_authenticated|yesno:'true,false' }}"
            data-user-id="{{ request.user.id|default_if_none:'' }}"
            hidden
        ></div>
    </section>


{% endblock %}
