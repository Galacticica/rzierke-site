<div class="tombstone-base relative w-full h-full {{ color_class }} {{ border_color }} border-4 flex flex-col items-center justify-center p-6 mx-auto shadow-2xl {{ shadow_color }} transition-transform duration-300 hover:scale-105">
    <!-- Decorative cross at top -->
    <div class="absolute top-4 w-6 h-6 flex flex-col items-center justify-center">
        <div class="w-1 h-3 {{ text_color }}"></div>
        <div class="w-3 h-1 {{ text_color }}"></div>
    </div>
    
    <!-- Main content area -->
    <div class="w-full h-full flex flex-col items-center justify-center px-2 py-4 space-y-3">
        <!-- Bot Name -->
        <h3 class="tombstone-name {{ text_color }} text-center break-words max-w-full">
            {{ bot.name }}
        </h3>
        
        <!-- Divider -->
        <div class="w-12 h-1 {{ text_color }} opacity-60"></div>
        
        <!-- Description -->
        <div class="tombstone-description {{ text_color }} text-center overflow-y-auto flex-1 max-w-full">
            <p class="break-words">{{ bot.description }}</p>
        </div>
    </div>
    
    <!-- Decorative base -->
    <div class="absolute bottom-2 left-4 right-4 h-1 {{ text_color }} opacity-40 rounded"></div>
</div>
