{% extends "base.html" %}

{% block title %}
<title>500 | Server Error</title>
{% endblock %}

{% block content %}
<section class="mx-auto max-w-3xl px-6 py-20 text-center">
	<p class="text-sm uppercase tracking-[0.25em] text-warning">Error 500</p>
	<h1 class="mt-4 text-4xl font-bold md:text-5xl">Something Went Wrong</h1>
	<p class="mt-6 text-lg text-base-content/80">
		We hit an unexpected issue while loading this page. Please try again.
	</p>
	<div class="mt-10 flex flex-wrap justify-center gap-3">
		<a href="{% url 'homepage' %}" class="btn btn-primary">Back To Home</a>
		<button class="btn btn-outline" onclick="window.location.reload()">Try Again</button>
	</div>
</section>
{% endblock %}
